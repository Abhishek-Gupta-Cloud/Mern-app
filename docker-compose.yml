# ── Production deployment configuration ──────────────────────────────────────
# Setup: copy service env examples to .env and update with your values
# Run: docker compose up --build -d
# Stop: docker compose down
# View logs: docker compose logs -f [service_name]

services:
  # ── Tier 3: MongoDB Database ──────────────────────────────────────
  mongo:
    image: mongo:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-mern}_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-secure_change_me}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-mernapp}
    volumes:
      - mongo-data:/data/db
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  # ── Tier 2: Auth service ─────────────────────────────────────────
  auth:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: ${COMPOSE_PROJECT_NAME:-mern}_auth
    restart: unless-stopped
    env_file:
      - ./services/auth-service/.env
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-secure_change_me}@mongo:27017/${MONGO_DB:-mernapp}?authSource=admin&retryWrites=true&w=majority
      PORT: 5001
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - backend-net
      - frontend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  tasks:
    build:
      context: ./services/tasks-service
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: ${COMPOSE_PROJECT_NAME:-mern}_tasks
    restart: unless-stopped
    env_file:
      - ./services/tasks-service/.env
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-secure_change_me}@mongo:27017/${MONGO_DB:-mernapp}?authSource=admin&retryWrites=true&w=majority
      PORT: 5002
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - backend-net
      - frontend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: ${COMPOSE_PROJECT_NAME:-mern}_gateway
    restart: unless-stopped
    env_file:
      - ./services/api-gateway/.env
    environment:
      NODE_ENV: production
      AUTH_URL: http://auth:5001
      TASKS_URL: http://tasks:5002
      PORT: 4000
    depends_on:
      auth:
        condition: service_started
      tasks:
        condition: service_started
    networks:
      - backend-net
      - frontend-net
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Tier 1: React Frontend + Nginx Reverse Proxy ───────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        NODE_ENV: production
    container_name: ${COMPOSE_PROJECT_NAME:-mern}_frontend
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - frontend-net
    ports:
      - "${FRONTEND_PORT:-80}:80"
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongo-data:
    driver: local
    # For production, consider using a named volume driver or external storage
    # driver_opts:
    #   type: nfs
    #   o: addr=nfs.server,vers=4,soft,timeo=180,bg,tcp,rw
    #   device: ":/mnt/nfs/mongo-data"

networks:
  backend-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br_backend
  frontend-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br_frontend
