upstream backend {
    server api-gateway:4000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 10M;

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── Compression ───────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml application/atom+xml image/svg+xml 
               text/x-js text/x-component text/x-cross-domain-policy;

    # ── Logging ───────────────────────────────────────────────────
    access_log /var/log/nginx/access.log combined buffer=32k flush=1s;
    error_log /var/log/nginx/error.log warn;

    # ── React SPA – always serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
        # Prevent caching HTML
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── API Proxy to backend ──────────────────────────────────────
    location /api/ {
        proxy_pass           http://backend;
        proxy_http_version   1.1;
        proxy_cache_bypass   $http_upgrade;
        
        # Headers
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-Host   $server_name;
        proxy_set_header Connection         "";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Static assets – aggressive caching ────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Deny access to sensitive files ────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
