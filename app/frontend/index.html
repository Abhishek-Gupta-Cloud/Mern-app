<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MERN Tasks</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #1a1a1a; }
      .loading { display: grid; place-items: center; min-height: 100vh; font-size: 1.1rem; color: #666; }
      main { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
      /* Navbar */
      nav { background: #fff; border-bottom: 1px solid #e5e5e5; padding: .75rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
      nav .brand { font-weight: 700; font-size: 1.1rem; color: #2563eb; }
      nav button { border: none; background: none; cursor: pointer; color: #555; font-size: .9rem; }
      nav button:hover { color: #2563eb; }
      /* Auth forms */
      .auth-wrap { min-height: 100vh; display: grid; place-items: center; background: #f5f5f5; }
      .auth-box { background: #fff; padding: 2.5rem; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,.08); width: 100%; max-width: 380px; }
      .auth-box h1 { margin-bottom: 1.5rem; font-size: 1.4rem; }
      .field { margin-bottom: 1rem; }
      .field label { display: block; font-size: .85rem; font-weight: 500; margin-bottom: .35rem; color: #555; }
      .field input { width: 100%; padding: .6rem .8rem; border: 1px solid #ddd; border-radius: 8px; font-size: .95rem; }
      .field input:focus { outline: 2px solid #2563eb; border-color: transparent; }
      .btn { width: 100%; padding: .7rem; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: 500; margin-top: .5rem; }
      .btn:hover { background: #1d4ed8; }
      .btn:disabled { opacity: .6; cursor: not-allowed; }
      .error { color: #dc2626; font-size: .85rem; margin-bottom: .75rem; background: #fef2f2; padding: .5rem .75rem; border-radius: 6px; }
      .link-row { text-align: center; margin-top: 1rem; font-size: .85rem; color: #555; }
      .link-row a { color: #2563eb; text-decoration: none; }
      /* Dashboard */
      .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
      .stat { background: #fff; border-radius: 10px; padding: 1.2rem; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
      .stat .num { font-size: 2rem; font-weight: 700; color: #2563eb; }
      .stat .lbl { font-size: .8rem; color: #888; margin-top: .2rem; }
      .task-form { background: #fff; padding: 1.25rem; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 1.5rem; display: flex; gap: .75rem; flex-wrap: wrap; }
      .task-form input { flex: 1; min-width: 160px; padding: .55rem .8rem; border: 1px solid #ddd; border-radius: 8px; font-size: .9rem; }
      .task-form select { padding: .55rem .6rem; border: 1px solid #ddd; border-radius: 8px; font-size: .9rem; }
      .task-form .btn { width: auto; margin: 0; padding: .55rem 1.2rem; }
      .task-list { display: flex; flex-direction: column; gap: .6rem; }
      .task-card { background: #fff; border-radius: 10px; padding: 1rem 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,.06); display: flex; align-items: center; gap: 1rem; }
      .task-card .title { flex: 1; font-weight: 500; }
      .task-card .title.done { text-decoration: line-through; color: #999; }
      .badge { font-size: .72rem; padding: .2rem .5rem; border-radius: 999px; font-weight: 500; }
      .badge.todo { background: #f1f5f9; color: #64748b; }
      .badge.in-progress { background: #eff6ff; color: #2563eb; }
      .badge.done { background: #f0fdf4; color: #16a34a; }
      .badge.high { background: #fef2f2; color: #dc2626; }
      .badge.medium { background: #fffbeb; color: #d97706; }
      .badge.low { background: #f0fdf4; color: #16a34a; }
      .task-card .del { background: none; border: none; cursor: pointer; color: #ccc; font-size: 1.1rem; }
      .task-card .del:hover { color: #dc2626; }
      .empty { text-align: center; color: #aaa; padding: 3rem; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
