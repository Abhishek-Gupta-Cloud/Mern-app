apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: shivagupta9765/mern-app-auth
          ports:
            - containerPort: 5001
          envFrom:
            - secretRef:
                name: app-secret
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5001"
