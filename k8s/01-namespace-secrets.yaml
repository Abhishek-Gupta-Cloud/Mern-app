apiVersion: v1
kind: Namespace
metadata:
  name: mern-app

---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: mern-app
type: Opaque
stringData:
  MONGO_ROOT_USER: admin
  MONGO_ROOT_PASSWORD: SecureMongoPassword123!
  MONGO_DB: mernapp

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: mern-app
type: Opaque
stringData:
  JWT_SECRET: dGhpcyBpcyBhIHZlcnkgbG9uZyByYW5kb20gc2VjcmV0IGtleSBmb3IgSldUIHRva2VuaXphdGlvbiB0aGF0IG11c3QgYmUgYXQgbGVhc3QgNjQgY2hhcmFjdGVycw==
  JWT_EXPIRES_IN: "7d"
  MONGO_URI: mongodb://admin:SecureMongoPassword123!@mongodb:27017/mernapp?authSource=admin&retryWrites=true&w=majority

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: mern-app
data:
  NODE_ENV: "production"
  PORT: "5000"
  CORS_ORIGINS: "http://localhost,http://frontend"
