apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 500
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: shivagupta9765/mern-app-frontend
          ports:
            - containerPort: 80
          env:
            - name: VITE_API_URL
              value: "/api"
